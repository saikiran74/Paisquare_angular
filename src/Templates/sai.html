<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .fullscreen-bg {
    overflow: hidden;
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    z-index: -1;
  }

  .fullscreen-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }

  .content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
  }
</style>
</head>
<body>

<div class="fullscreen-bg">
  <img src="./assets/images/Ooty.jpg" alt="Full Screen Background Image">
</div>

<div class="content1">
  <h1>Your Text Here</h1>
  <p>Your additional text here</p>
</div>

<!-- Add more content if needed -->

</body>
</html>
